<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Quota Tray</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CLIProxyAPI</p>
          <h1>Codex Quota Tray</h1>
        </div>
        <span class="state-pill" id="statusPill">
          <span class="state-dot"></span>
          <span id="statusText">Normal</span>
        </span>
      </header>

      <section class="config-panel" id="configPanel" aria-label="CLIProxyAPI configuration">
        <div class="section-title">
          <span data-i18n="configTitle">CLIProxyAPI 配置</span>
          <span id="configState">未配置</span>
        </div>
        <label>
          <span data-i18n="baseUrl">Management API 地址</span>
          <input id="baseUrlInput" type="url" spellcheck="false" placeholder="http://127.0.0.1:8317">
        </label>
        <label>
          <span data-i18n="managementKey">管理密钥</span>
          <input id="managementKeyInput" type="password" spellcheck="false" placeholder="首次配置必须填写">
        </label>
        <div class="refresh-options">
          <label class="toggle-row">
            <input id="autoRefreshInput" type="checkbox">
            <span data-i18n="autoRefresh">自动刷新</span>
          </label>
          <label class="toggle-row">
            <input id="usageStatsInput" type="checkbox">
            <span data-i18n="usageStats">今日统计</span>
          </label>
        </div>
        <div class="refresh-options">
          <label>
            <span data-i18n="refreshInterval">刷新间隔（秒）</span>
            <input id="refreshIntervalInput" type="number" min="60" max="3600" step="30" inputmode="numeric">
          </label>
          <label>
            <span data-i18n="usagePoll">用量采集</span>
            <input id="usagePollInput" type="text" value="30 sec" readonly>
          </label>
        </div>
        <div class="ui-options">
          <label>
            <span data-i18n="position">状态条位置</span>
            <select id="statusBarPositionInput">
              <option value="top-left" data-i18n="topLeft">左上方</option>
              <option value="top-right" data-i18n="topRight">右上方</option>
              <option value="bottom-left" data-i18n="bottomLeft">左下方</option>
              <option value="bottom-right" data-i18n="bottomRight">右下方</option>
            </select>
          </label>
          <label>
            <span data-i18n="language">语言</span>
            <select id="languageInput">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>
        <label>
          <span id="opacityLabel">背景透明度 88%</span>
          <input id="statusBarOpacityInput" type="range" min="0" max="100" step="1">
        </label>
        <div class="config-actions">
          <button id="saveConfigButton" type="button" data-i18n="saveAndRefresh">保存并刷新</button>
          <p id="configMessage">配置保存在本机 Electron userData 目录。</p>
        </div>
      </section>

      <section class="meter-section" aria-label="Codex Plus pool overview">
        <div class="meter" id="codexMeter" style="--value: 0deg">
          <div class="meter-core">
            <span id="codexPercent">--%</span>
            <small data-i18n="effective">有效</small>
          </div>
        </div>
        <div class="quota-copy">
          <p class="label" data-i18n="poolTitle">Codex Plus 账号池</p>
          <strong id="codexRemaining">-- / --</strong>
          <span id="codexReset">可用账号 --/--</span>
        </div>
      </section>

      <section class="metric-grid" aria-label="Quota metrics">
        <article class="metric">
          <div class="metric-head">
            <span data-i18n="fiveHourPool">5H 池</span>
            <strong id="apiPercent">--%</strong>
          </div>
          <div class="bar">
            <span id="apiBar"></span>
          </div>
          <p id="apiBudget">Next reset --</p>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span data-i18n="weekPool">Week 池</span>
            <strong id="codexUsed">--</strong>
          </div>
          <div class="bar">
            <span id="codexBar"></span>
          </div>
          <p id="codexLimit">Next reset --</p>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span data-i18n="todayTokens">今日 Tokens</span>
            <strong id="todayTokens">--</strong>
          </div>
          <p id="todayTokensDetail">--</p>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span data-i18n="todayCost">今日金额</span>
            <strong id="todayCost">--</strong>
          </div>
          <p id="todayCostDetail">--</p>
        </article>
      </section>

      <section class="accounts" aria-label="Plus accounts">
        <div class="section-title">
          <span data-i18n="accountDetails">Plus 账号明细</span>
          <div class="account-toolbar">
            <span id="accountSummary">--</span>
            <div class="segmented-control" role="group" aria-label="Account filter">
              <button class="segment is-active" id="accountFilterReady" type="button" data-filter="ready" data-i18n="filterReady">可用</button>
              <button class="segment" id="accountFilterAll" type="button" data-filter="all" data-i18n="filterAll">全部</button>
              <button class="segment" id="accountFilterUnavailable" type="button" data-filter="unavailable" data-i18n="filterUnavailable">不可用</button>
            </div>
          </div>
        </div>
        <ol class="account-list" id="accountList"></ol>
      </section>

      <section class="actions single-action" aria-label="Actions">
        <button id="refreshButton" type="button" data-i18n="refresh">刷新</button>
      </section>

      <section class="links" aria-label="External links">
        <button id="openApiButton" type="button">CLIProxyAPI</button>
      </section>

      <section class="activity" aria-label="Activity">
        <div class="section-title">
          <span data-i18n="activity">刷新记录</span>
          <time id="updatedAt">--</time>
        </div>
        <ol id="eventList"></ol>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
