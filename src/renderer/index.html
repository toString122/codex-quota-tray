<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Quota Tray</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">CLIProxyAPI</p>
          <h1>Codex Quota Tray</h1>
        </div>
        <span class="state-pill" id="statusPill">
          <span class="state-dot"></span>
          <span id="statusText">Normal</span>
        </span>
      </header>

      <section class="config-panel" id="configPanel" aria-label="CLIProxyAPI configuration">
        <div class="section-title">
          <span>CLIProxyAPI 配置</span>
          <span id="configState">未配置</span>
        </div>
        <label>
          <span>Management API 地址</span>
          <input id="baseUrlInput" type="url" spellcheck="false" placeholder="http://127.0.0.1:8317">
        </label>
        <label>
          <span>管理密钥</span>
          <input id="managementKeyInput" type="password" spellcheck="false" placeholder="首次配置必须填写">
        </label>
        <div class="config-actions">
          <button id="saveConfigButton" type="button">保存并刷新</button>
          <p id="configMessage">配置保存在本机 Electron userData 目录。</p>
        </div>
      </section>

      <section class="meter-section" aria-label="Codex Plus pool overview">
        <div class="meter" id="codexMeter" style="--value: 0deg">
          <div class="meter-core">
            <span id="codexPercent">--%</span>
            <small>有效</small>
          </div>
        </div>
        <div class="quota-copy">
          <p class="label">Codex Plus 账号池</p>
          <strong id="codexRemaining">-- / --</strong>
          <span id="codexReset">可用账号 --/--</span>
        </div>
      </section>

      <section class="metric-grid" aria-label="Quota metrics">
        <article class="metric">
          <div class="metric-head">
            <span>5H 池</span>
            <strong id="apiPercent">--%</strong>
          </div>
          <div class="bar">
            <span id="apiBar"></span>
          </div>
          <p id="apiBudget">Next reset --</p>
        </article>

        <article class="metric">
          <div class="metric-head">
            <span>Week 池</span>
            <strong id="codexUsed">--</strong>
          </div>
          <div class="bar">
            <span id="codexBar"></span>
          </div>
          <p id="codexLimit">Next reset --</p>
        </article>
      </section>

      <section class="accounts" aria-label="Plus accounts">
        <div class="section-title">
          <span>Plus 账号明细</span>
          <span id="accountSummary">--</span>
        </div>
        <ol class="account-list" id="accountList"></ol>
      </section>

      <section class="actions single-action" aria-label="Actions">
        <button id="refreshButton" type="button">刷新</button>
      </section>

      <section class="links" aria-label="External links">
        <button id="openCodexButton" type="button">Codex</button>
        <button id="openApiButton" type="button">CLIProxyAPI</button>
      </section>

      <section class="activity" aria-label="Activity">
        <div class="section-title">
          <span>刷新记录</span>
          <time id="updatedAt">--</time>
        </div>
        <ol id="eventList"></ol>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
