<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Quota Status</title>
    <link rel="stylesheet" href="./statusbar.css">
  </head>
  <body class="status-good">
    <button class="status-strip" id="statusStrip" type="button" aria-label="打开 Codex 余量面板">
      <span class="status-light" aria-hidden="true"></span>
      <span class="status-lines">
        <span class="line">
          <strong>5H</strong>
          <span id="fiveHourText">--%</span>
        </span>
        <span class="line">
          <strong>Week</strong>
          <span id="weeklyText">--%</span>
        </span>
      </span>
      <span class="status-badge" id="statusBadge">OK</span>
    </button>

    <script src="./statusbar.js"></script>
  </body>
</html>
