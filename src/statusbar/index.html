<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Quota Status</title>
    <link rel="stylesheet" href="./statusbar.css">
  </head>
  <body class="status-good">
    <div class="status-strip" id="statusStrip" aria-label="Codex quota status">
      <span class="status-light" aria-hidden="true"></span>
      <span class="status-lines">
        <span class="status-line">
          <strong>5H</strong>
          <span id="fiveHourText">--%</span>
          <strong>Week</strong>
          <span id="weeklyText">--%</span>
        </span>
        <span class="status-line usage-line">
          <strong>Tok</strong>
          <span id="todayTokensText">--</span>
          <strong>$</strong>
          <span id="todayCostText">--</span>
        </span>
      </span>
      <button class="status-badge" id="statusBadge" type="button" aria-label="Open Codex quota panel">OK</button>
    </div>

    <script src="./statusbar.js"></script>
  </body>
</html>
